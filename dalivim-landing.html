<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Dalivim — Acordos mais seguros aqui.</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --dv-ink:            #0A0A0A;
  --dv-ink-2:          #141416;
  --dv-ink-3:          #1C1C20;
  --dv-ink-4:          #2A2A2E;
  --dv-ink-5:          #3F3F46;
  --dv-paper:          #FFFFFF;
  --dv-paper-2:        #FAFAFA;
  --dv-paper-3:        #F4F4F5;
  --dv-border:         #1C1C20;
  --dv-border-light:   #E4E4E7;
  --dv-border-strong:  #3F3F46;
  --dv-muted:          #71717A;
  --dv-muted-2:        #A1A1AA;
  --dv-muted-dark:     #8A8A92;
  --dv-muted-dark-2:   #5A5A62;
  --dv-blue-500:       #1E4BA0;
  --dv-blue-600:       #153A82;
  --dv-blue-700:       #0B2A63;
  --dv-success:        #1E8A5A;
  --dv-warning:        #B45309;
  --dv-danger:         #B42318;
  --dv-action:         #1E4BA0;
  --dv-action-hover:   #153A82;
  --dv-font-display:   'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --dv-font-body:      'Inter', ui-sans-serif, system-ui, sans-serif;
  --dv-font-mono:      ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;
  --dv-ease:           cubic-bezier(0.2, 0.6, 0.2, 1);
}
html, body { margin: 0; padding: 0; background: #fff; color: #0A0A0A; font-family: var(--dv-font-body); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
*, *::before, *::after { box-sizing: border-box; }
a { color: inherit; }
button:focus-visible, input:focus-visible, textarea:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(30,75,160,0.25); }
@keyframes dv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes dv-slide-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes dv-orbit-a { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes dv-orbit-b { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
.dv-orbit-a { animation: dv-orbit-a 220s linear infinite; transform-origin: 800px 450px; }
.dv-orbit-b { animation: dv-orbit-b 340s linear infinite; transform-origin: 800px 450px; }
.dv-orbit-c { animation: dv-orbit-a 480s linear infinite; transform-origin: 800px 450px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ─── ICON ───────────────────────────────────────────────────────────────────
function Icon({ name, size = 16, color = 'currentColor', strokeWidth = 2, style = {} }) {
  const common = {
    width: size, height: size,
    viewBox: '0 0 24 24', fill: 'none',
    stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round',
    style: { flexShrink: 0, ...style },
    'aria-hidden': true,
  };
  switch (name) {
    case 'check':         return <svg {...common}><polyline points="20 6 9 17 4 12"/></svg>;
    case 'arrow-right':   return <svg {...common}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
    case 'chevron-down':  return <svg {...common}><polyline points="6 9 12 15 18 9"/></svg>;
    case 'x':             return <svg {...common}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    case 'shield-check':  return <svg {...common}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>;
    case 'banknote':      return <svg {...common}><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>;
    case 'check-circle':  return <svg {...common}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    case 'lock':          return <svg {...common}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    case 'linkedin':      return <svg {...common}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 1 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>;
    case 'twitter':       return <svg {...common}><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53A4.48 4.48 0 0 0 12 8v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>;
    case 'github':        return <svg {...common}><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>;
    default:              return <svg {...common}><circle cx="12" cy="12" r="9"/></svg>;
  }
}

// ─── ATOMS ──────────────────────────────────────────────────────────────────
function Button({ variant = 'primary', children, onClick, style = {} }) {
  const base = {
    fontFamily: "'Inter', sans-serif", fontWeight: 500, fontSize: 15,
    borderRadius: 9999, padding: '14px 28px', border: 'none', cursor: 'pointer',
    transition: 'all 220ms cubic-bezier(0.2, 0.6, 0.2, 1)',
    display: 'inline-flex', alignItems: 'center', gap: 8, whiteSpace: 'nowrap',
  };
  const variants = {
    primary:   { background: '#1E4BA0', color: '#fff' },
    dark:      { background: '#0A0A0A', color: '#fff' },
    secondary: { background: '#F4F4F5', color: '#0A0A0A' },
    outlined:  { background: 'transparent', color: '#0A0A0A', border: '1.5px solid #E4E4E7', padding: '12.5px 26.5px' },
    ghostDark: { background: 'rgba(255,255,255,0.06)', color: '#fff', border: '1.5px solid rgba(255,255,255,0.15)', padding: '12.5px 26.5px' },
  };
  return (
    <button
      style={{ ...base, ...variants[variant], ...style }}
      onClick={onClick}
      onMouseEnter={e => {
        if (variant === 'primary')   e.currentTarget.style.background = '#153A82';
        else if (variant === 'dark') e.currentTarget.style.opacity = 0.88;
        else if (variant === 'secondary') e.currentTarget.style.background = '#ECECEF';
        else if (variant === 'outlined')  e.currentTarget.style.background = '#F4F4F5';
        else if (variant === 'ghostDark') e.currentTarget.style.background = 'rgba(255,255,255,0.12)';
      }}
      onMouseLeave={e => {
        e.currentTarget.style.background = variants[variant].background;
        e.currentTarget.style.opacity = 1;
      }}
    >{children}</button>
  );
}

function Container({ children, style = {}, className = '' }) {
  return (
    <div className={className} style={{ maxWidth: 1200, margin: '0 auto', padding: '0 24px', ...style }}>
      {children}
    </div>
  );
}

// ─── DALIVIM MARK SVG ────────────────────────────────────────────────────────
function DalivimMark({ size = 32, color = 'currentColor' }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width={size} height={size} style={{ color }}>
      <g fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round">
        <path d="M32 8 L54 20 L54 44 L32 56 L10 44 L10 20 Z"/>
        <path d="M32 8 L32 32 M54 20 L32 32 M54 44 L32 32 M32 56 L32 32 M10 44 L32 32 M10 20 L32 32"/>
      </g>
      <g fill="currentColor">
        <circle cx="32" cy="8" r="5"/>
        <circle cx="54" cy="20" r="5"/>
        <circle cx="54" cy="44" r="5"/>
        <circle cx="32" cy="56" r="5"/>
        <circle cx="10" cy="44" r="5"/>
        <circle cx="10" cy="20" r="5"/>
        <circle cx="32" cy="32" r="6"/>
      </g>
    </svg>
  );
}

// ─── HEADER ──────────────────────────────────────────────────────────────────
function Header({ onCta }) {
  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 50,
      background: 'rgba(255,255,255,0.9)', backdropFilter: 'blur(12px)',
      borderBottom: '1px solid #E4E4E7',
    }}>
      <Container style={{ height: 80, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <DalivimMark size={32} color="#0A0A0A"/>
          <span style={{ fontFamily: "'Space Grotesk'", fontWeight: 500, fontSize: 22, letterSpacing: '-0.012em' }}>Dalivim</span>
        </div>
        <nav style={{ display: 'flex', alignItems: 'center', gap: 40, fontSize: 15, fontFamily: "'Inter'" }}>
          <a href="#how" style={{ color: '#0A0A0A', textDecoration: 'none', opacity: 0.8, transition: 'opacity 180ms' }}
            onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0.8}>
            Como funciona
          </a>
          <a href="#uses" style={{ color: '#0A0A0A', textDecoration: 'none', opacity: 0.8, transition: 'opacity 180ms' }}
            onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0.8}>
            Usos
          </a>
          <a href="#faq" style={{ color: '#0A0A0A', textDecoration: 'none', opacity: 0.8, transition: 'opacity 180ms' }}
            onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0.8}>
            Perguntas
          </a>
        </nav>
        <Button variant="primary" onClick={onCta}>Criar transação</Button>
      </Container>
    </header>
  );
}

// ─── HERO ────────────────────────────────────────────────────────────────────
function Hero({ onPrimary, onSecondary }) {
  return (
    <section style={{ paddingTop: 200, paddingBottom: 128 }}>
      <Container style={{ textAlign: 'center' }}>
        <h1 style={{
          fontFamily: "'Space Grotesk'", fontWeight: 500,
          fontSize: 'clamp(48px, 8vw, 96px)',
          lineHeight: 1.04, letterSpacing: '-0.022em',
          margin: '0 auto', maxWidth: 960, color: '#0A0A0A',
        }}>
          Medo de não receber?<br/>
          <span style={{ color: '#71717A' }}>Sem problema. A gente garante.</span>
        </h1>
        <p style={{
          fontFamily: "'Inter'", fontSize: 19, fontWeight: 400,
          color: '#71717A', lineHeight: 1.6,
          maxWidth: 640, margin: '32px auto 0',
        }}>
          Uma camada de segurança para freelancers e negociações online. O pagamento fica seguro até as duas partes cumprirem o acordo.
        </p>
        <div style={{ marginTop: 48, display: 'flex', gap: 14, justifyContent: 'center', flexWrap: 'wrap' }}>
          <Button variant="primary" onClick={onPrimary} style={{ padding: '16px 32px', fontSize: 16 }}>Crie uma transação segura</Button>
          <Button variant="outlined" onClick={onSecondary} style={{ padding: '14.5px 30.5px', fontSize: 16 }}>Veja como funciona</Button>
        </div>
      </Container>
    </section>
  );
}

function TrustStrip() {
  const items = [
    { icon: 'shield-check', label: 'Feito para negociações de confiança' },
    { icon: 'banknote',     label: 'Pagamento simples com Pix' },
    { icon: 'check-circle', label: 'Liberação clara e transparente' },
    { icon: 'lock',         label: 'Proteção para os dois lados' },
  ];
  return (
    <section style={{ padding: '48px 0', borderTop: '1px solid #E4E4E7', borderBottom: '1px solid #E4E4E7' }}>
      <Container style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 24, textAlign: 'center' }}>
        {items.map(it => (
          <div key={it.label} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
            <Icon name={it.icon} size={24} color="#71717A"/>
            <span style={{ fontFamily: "'Inter'", fontWeight: 500, fontSize: 15, color: '#0A0A0A' }}>{it.label}</span>
          </div>
        ))}
      </Container>
    </section>
  );
}

// ─── HOW IT WORKS ────────────────────────────────────────────────────────────
const HIW_STATES = [
  {
    id: 'received', chip: 'Pagamento recebido', title: 'Fundos protegidos',
    caption: 'O dinheiro do comprador ficou em custódia. Nada se move até você entregar.',
    stepTitle: 'Comprador paga', stepBody: 'O valor combinado entra em custódia no mesmo instante.',
  },
  {
    id: 'awaiting', chip: 'Aguardando entrega', title: 'Tudo pronto para começar',
    caption: 'Você pode trabalhar com tranquilidade. O pagamento já está garantido.',
    stepTitle: 'Entrega em andamento', stepBody: 'Os fundos seguem protegidos enquanto o combinado é cumprido.',
  },
  {
    id: 'released', chip: 'Liberado ao vendedor', title: 'Pagamento concluído',
    caption: 'Entrega confirmada pelos dois lados. O dinheiro foi liberado.',
    stepTitle: 'Dinheiro liberado', stepBody: 'Assim que a entrega é confirmada, o valor vai direto para você.',
  },
];
const HIW_DWELL = 3200;

function useSlowState() {
  const [idx, setIdx] = useState(0);
  const [autoplay, setAutoplay] = useState(true);
  const timerRef = useRef(null);
  const mountedRef = useRef(true);
  useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; clearTimeout(timerRef.current); }; }, []);
  useEffect(() => {
    if (!autoplay) return;
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => { if (mountedRef.current) setIdx(i => (i + 1) % HIW_STATES.length); }, HIW_DWELL);
    return () => clearTimeout(timerRef.current);
  }, [idx, autoplay]);
  const jumpTo = i => { clearTimeout(timerRef.current); setIdx(i); setAutoplay(true); };
  return { idx, jumpTo };
}

function CalmSteps({ idx, onJump }) {
  return (
    <ol style={{ listStyle: 'none', margin: 0, padding: 0, display: 'flex', flexDirection: 'column', gap: 8 }}>
      {HIW_STATES.map((s, i) => {
        const active = i === idx; const done = i < idx;
        return (
          <li key={s.id}>
            <button onClick={() => onJump(i)} style={{
              width: '100%', textAlign: 'left', background: 'transparent', border: 'none',
              display: 'grid', gridTemplateColumns: '18px 1fr', gap: 20, padding: '22px 0',
              borderBottom: i < HIW_STATES.length - 1 ? '1px solid #E4E4E7' : 'none',
              cursor: 'pointer', opacity: active ? 1 : 0.45,
              transition: 'opacity 320ms cubic-bezier(0.2,0.6,0.2,1)',
            }}>
              <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 8 }}>
                <span style={{
                  width: active ? 12 : 8, height: active ? 12 : 8, borderRadius: 9999,
                  background: active || done ? '#0A0A0A' : '#D4D4D8',
                  transition: 'all 320ms cubic-bezier(0.2,0.6,0.2,1)',
                }}/>
              </div>
              <div>
                <div style={{ fontFamily: "'Space Grotesk'", fontWeight: 500, fontSize: 22, letterSpacing: '-0.012em', color: '#0A0A0A', marginBottom: 6 }}>{s.stepTitle}</div>
                <div style={{ fontFamily: "'Inter'", fontSize: 15, lineHeight: 1.55, color: '#52525B' }}>{s.stepBody}</div>
              </div>
            </button>
          </li>
        );
      })}
    </ol>
  );
}

function ShieldGlyph({ active, released }) {
  const color = released ? '#7FD1A8' : active ? '#A8C2EA' : 'rgba(255,255,255,0.45)';
  return (
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style={{ transition: 'color 500ms', color }}>
      <path d="M20 5 L33 9 V20 C33 28 27 33 20 35 C13 33 7 28 7 20 V9 Z" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinejoin="round"/>
      {released
        ? <path d="M14 20 L18.5 24.5 L26 16" stroke="currentColor" strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        : <path d="M16 17 h8 M16 21 h8 M16 25 h5" stroke="currentColor" strokeWidth="1.2" fill="none" strokeLinecap="round" opacity="0.7"/>
      }
    </svg>
  );
}

function ProgressTrack({ idx }) {
  return (
    <div style={{ display: 'flex', gap: 6, marginTop: 4 }}>
      {[0, 1, 2].map(i => (
        <div key={i} style={{
          flex: 1, height: 3, borderRadius: 2,
          background: i <= idx ? '#A8C2EA' : 'rgba(255,255,255,0.10)',
          transition: 'background 600ms cubic-bezier(0.2,0.6,0.2,1)',
        }}/>
      ))}
    </div>
  );
}

function TrustCard({ idx }) {
  const state = HIW_STATES[idx];
  const released = idx === 2; const active = idx >= 1;
  return (
    <div style={{
      position: 'relative', background: '#141418', color: '#fff',
      borderRadius: 20, padding: '44px 44px 40px',
      border: '1px solid rgba(255,255,255,0.08)',
      display: 'flex', flexDirection: 'column', gap: 36,
      minHeight: 520, overflow: 'hidden',
    }}>
      <div aria-hidden style={{ position: 'absolute', inset: 0, pointerEvents: 'none', background: 'radial-gradient(600px 320px at 80% 0%, rgba(30,75,160,0.16), transparent 70%)' }}/>
      <div style={{ position: 'relative', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 10,
          padding: '8px 16px', background: 'rgba(255,255,255,0.06)',
          border: '1px solid rgba(255,255,255,0.10)', borderRadius: 9999,
          fontFamily: "'Inter'", fontSize: 13, fontWeight: 500, color: '#fff', letterSpacing: '-0.005em',
          transition: 'all 500ms cubic-bezier(0.2,0.6,0.2,1)',
        }}>
          <span style={{
            width: 8, height: 8, borderRadius: 9999,
            background: released ? '#7FD1A8' : '#A8C2EA',
            boxShadow: `0 0 0 4px ${released ? 'rgba(127,209,168,0.18)' : 'rgba(168,194,234,0.18)'}`,
            transition: 'all 500ms',
          }}/>
          {state.chip}
        </span>
        <span style={{ fontFamily: "'Inter'", fontSize: 13, color: 'rgba(255,255,255,0.5)' }}>
          Para <span style={{ color: 'rgba(255,255,255,0.85)' }}>Ana Ribeiro</span>
        </span>
      </div>
      <div style={{ position: 'relative' }}>
        <div style={{ fontFamily: "'Inter'", fontSize: 13, color: 'rgba(255,255,255,0.5)', marginBottom: 10, letterSpacing: '-0.005em' }}>Valor em custódia</div>
        <div style={{ fontFamily: "'Space Grotesk'", fontWeight: 500, fontSize: 64, lineHeight: 1, letterSpacing: '-0.028em', color: '#fff' }}>R$ 2.480,00</div>
      </div>
      <div style={{
        position: 'relative', display: 'flex', alignItems: 'center', gap: 20,
        padding: '24px 24px', background: 'rgba(255,255,255,0.03)',
        border: '1px solid rgba(255,255,255,0.08)', borderRadius: 14,
        transition: 'all 500ms cubic-bezier(0.2,0.6,0.2,1)',
      }}>
        <div style={{
          width: 56, height: 56, borderRadius: 14,
          background: released ? 'rgba(127,209,168,0.10)' : 'rgba(168,194,234,0.08)',
          border: `1px solid ${released ? 'rgba(127,209,168,0.28)' : 'rgba(168,194,234,0.22)'}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          transition: 'all 500ms cubic-bezier(0.2,0.6,0.2,1)',
        }}>
          <ShieldGlyph active={active} released={released}/>
        </div>
        <div style={{ minWidth: 0 }}>
          <div key={state.id + '-title'} style={{ fontFamily: "'Space Grotesk'", fontWeight: 500, fontSize: 22, letterSpacing: '-0.014em', color: '#fff', marginBottom: 4, animation: 'dv-fade-in 520ms cubic-bezier(0.2,0.6,0.2,1) both' }}>{state.title}</div>
          <div key={state.id + '-caption'} style={{ fontFamily: "'Inter'", fontSize: 14, lineHeight: 1.55, color: 'rgba(255,255,255,0.65)', animation: 'dv-fade-in 620ms cubic-bezier(0.2,0.6,0.2,1) both' }}>{state.caption}</div>
        </div>
      </div>
      <div style={{ position: 'relative', marginTop: 'auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: "'Inter'", fontSize: 12, color: 'rgba(255,255,255,0.55)', marginBottom: 10, letterSpacing: '-0.005em' }}>
          <span>Pagamento</span><span>Entrega</span><span>Liberação</span>
        </div>
        <ProgressTrack idx={idx}/>
      </div>
    </div>
  );
}

function HowItWorks() {
  const { idx, jumpTo } = useSlowState();
  return (
    <section id="how" style={{ padding: '128px 0', background: '#F4F4F5', borderBottom: '1px solid #E4E4E7' }}>
      <Container>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 64, gap: 24, flexWrap: 'wrap' }}>
          <div>
            <div style={{ fontFamily: "'Inter'", fontSize: 12, fontWeight: 500, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#71717A', marginBottom: 14 }}>Como funciona</div>
            <h2 style={{ fontFamily: "'Space Grotesk'", fontWeight: 500, fontSize: 'clamp(40px, 5vw, 64px)', lineHeight: 1.02, letterSpacing: '-0.024em', margin: 0, color: '#0A0A0A' }}>
              Seu dinheiro, protegido.<br/><span style={{ color: '#71717A' }}>Do pagamento até a entrega.</span>
            </h2>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.2fr', gap: 72, alignItems: 'start' }}>
          <CalmSteps idx={idx} onJump={jumpTo}/>
          <TrustCard idx={idx}/>

// ─── ORBITS & STARFIELD ───────────────────────────────────────────────────────
function Starfield() {
  const stars = useMemo(() => {
    let seed = 7;
    const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    const out = [];
    for (let i = 0; i < 180; i++) {
      const isAnchor = rand() < 0.04;
      out.push({ x: rand() * 100, y: rand() * 100, r: isAnchor ? 0.9 + rand() * 0.6 : 0.35 + rand() * 0.4, o: isAnchor ? 0.5 + rand() * 0.25 : 0.08 + rand() * 0.18, k: isAnchor });
    }
    return out;
  }, []);
  const [tilt, setTilt] = useState({ x: 0, y: 0 });
  useEffect(() => {
    const onMove = e => { const dx = (e.clientX / window.innerWidth - 0.5) * 2; const dy = (e.clientY / window.innerHeight - 0.5) * 2; setTilt({ x: dx, y: dy }); };
    window.addEventListener('mousemove', onMove);
    return () => window.removeEventListener('mousemove', onMove);
  }, []);
  return (
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', transform: `translate3d(${tilt.x * -4}px, ${tilt.y * -4}px, 0)`, transition: 'transform 1400ms cubic-bezier(0.2,0.6,0.2,1)', pointerEvents: 'none' }}>
      {stars.map((s, i) => (
        <g key={i} opacity={s.o}>
          <circle cx={s.x} cy={s.y} r={s.r * 0.15} fill="#fff"/>
          {s.k && <g stroke="#fff" strokeWidth="0.04" opacity="0.55"><line x1={s.x - s.r * 0.6} y1={s.y} x2={s.x + s.r * 0.6} y2={s.y}/><line x1={s.x} y1={s.y - s.r * 0.6} x2={s.x} y2={s.y + s.r * 0.6}/></g>}
        </g>
      ))}
    </svg>
  );
}

// ─── STICKY CTA ──────────────────────────────────────────────────────────────
function StickyCta({ onCta }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const onScroll = () => { const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight); setVisible(pct > 0.25 && pct < 0.92); };
    window.addEventListener('scroll', onScroll, { passive: true }); onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <div style={{
      position: 'fixed', bottom: 24, left: '50%',
      transform: `translateX(-50%) translateY(${visible ? 0 : 24}px)`,
      opacity: visible ? 1 : 0, pointerEvents: visible ? 'auto' : 'none',
      transition: 'opacity 280ms cubic-bezier(0.2,0.6,0.2,1), transform 280ms cubic-bezier(0.2,0.6,0.2,1)', zIndex: 50,
      background: '#0A0A0A', border: '1px solid rgba(255,255,255,0.12)', borderRadius: 9999,
      padding: '8px 8px 8px 24px', display: 'flex', alignItems: 'center', gap: 16,
      boxShadow: '0 20px 48px -12px rgba(0,0,0,0.4)',
    }}>
      <span style={{ fontFamily: "'Inter'", fontSize: 14, color: 'rgba(255,255,255,0.9)', display: 'inline-flex', alignItems: 'center', gap: 10 }}>
        <span style={{ width: 8, height: 8, borderRadius: 9999, background: '#1E8A5A', boxShadow: '0 0 0 4px rgba(30,138,90,0.2)' }}/>
        Comece grátis em menos de 1 minuto
      </span>
      <Button variant="primary" onClick={onCta} style={{ padding: '10px 20px', fontSize: 14 }}>Criar transação<Icon name="arrow-right" size={14}/></Button>
    </div>
  );
}
